<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EcoPickup – Track Status</title>
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
  body { font-family: 'Nunito', sans-serif; background: #f4fdf7; margin: 0; }
  .app-shell { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #f4fdf7; padding-bottom: 80px; }
  .status-header { background: linear-gradient(135deg,#064e35,#059669); padding: 20px; color: white; display: flex; align-items: center; gap: 12px; }
  .status-header h2 { margin: 0; font-size: 20px; font-family: 'Playfair Display', serif; }
  .back-btn { font-size: 22px; cursor: pointer; text-decoration: none; color: white; }
  .filter-tabs { display: flex; gap: 8px; padding: 16px; overflow-x: auto; }
  .filter-tab { padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; border: 1.5px solid #c6f0d9; background: white; color: #5a7a65; white-space: nowrap; font-family: 'Nunito', sans-serif; }
  .filter-tab.active { background: linear-gradient(135deg,#064e35,#059669); color: white; border-color: transparent; }
  .req-list { padding: 0 16px; }
  .req-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); border-left: 4px solid #10b981; }
  .req-card.pending { border-left-color: #f59e0b; }
  .req-card.inprogress { border-left-color: #3b82f6; }
  .req-card.done { border-left-color: #10b981; }
  .req-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .req-type { font-weight: 800; font-size: 15px; color: #0c2116; }
  .badge { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; }
  .badge-pending { background: #fef3c7; color: #92400e; }
  .badge-inprogress { background: #dbeafe; color: #1e40af; }
  .badge-done { background: #d1fae5; color: #065f46; }
  .req-meta { font-size: 12px; color: #5a7a65; font-weight: 600; }
  .empty-msg { text-align: center; padding: 40px 20px; color: #5a7a65; font-weight: 600; }
  .loading-msg { text-align: center; padding: 40px 20px; color: #5a7a65; font-weight: 600; }
</style>
</head>
<body>
<div class="app-shell">

  <div class="status-header">
    <a href="index.html" class="back-btn">←</a>
    <h2>🔍 Track Your Requests</h2>
  </div>

  <div class="filter-tabs">
    <button class="filter-tab active" onclick="filterReqs('All', this)">All</button>
    <button class="filter-tab" onclick="filterReqs('Pending', this)">⏳ Pending</button>
    <button class="filter-tab" onclick="filterReqs('In Progress', this)">🔄 In Progress</button>
    <button class="filter-tab" onclick="filterReqs('Done', this)">✅ Done</button>
  </div>

  <div class="req-list" id="reqList">
    <div class="loading-msg">Loading your requests...</div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
    <a href="request.html" class="nav-item"><span class="nav-icon">📝</span><span>Request</span></a>
    <a href="status.html" class="nav-item active"><span class="nav-icon">🔍</span><span>Track</span></a>
    <a href="userprofie.html" class="nav-item"><span class="nav-icon">👤</span><span>Profile</span></a>
  </nav>

</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAQTRW_YFVBCuuNlOe4wZ0rvEQnKDHrT-c",
  authDomain: "waste-management-system-7b2d4.firebaseapp.com",
  projectId: "waste-management-system-7b2d4",
  storageBucket: "waste-management-system-7b2d4.firebasestorage.app",
  messagingSenderId: "791452329907",
  appId: "1:791452329907:web:9f1909e3d2bff35f354dc6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
let allRequests = [];

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  try {
    const snapshot = await db.collection('requests')
      .where('userId', '==', user.uid)
      .orderBy('createdAt', 'desc')
      .get();
    allRequests = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderReqs(allRequests);
  } catch(e) {
    document.getElementById('reqList').innerHTML = '<div class="empty-msg">❌ Error loading requests</div>';
  }
});

function filterReqs(filter, btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const filtered = filter === 'All' ? allRequests : allRequests.filter(r => r.status === filter);
  renderReqs(filtered);
}

function renderReqs(reqs) {
  const container = document.getElementById('reqList');
  if (reqs.length === 0) {
    container.innerHTML = '<div class="empty-msg">No requests found 📭</div>';
    return;
  }
  container.innerHTML = reqs.map(r => {
    const statusClass = r.status === 'Pending' ? 'pending' : r.status === 'In Progress' ? 'inprogress' : 'done';
    const badgeClass  = r.status === 'Pending' ? 'badge-pending' : r.status === 'In Progress' ? 'badge-inprogress' : 'badge-done';
    const icon = r.status === 'Pending' ? '⏳' : r.status === 'In Progress' ? '🔄' : '✅';
    return `
      <div class="req-card ${statusClass}">
        <div class="req-top">
          <span class="req-type">${icon} ${r.wasteType || 'Waste'} Pickup</span>
          <span class="badge ${badgeClass}">${r.status}</span>
        </div>
        <div class="req-meta">📅 ${r.pickupDate || 'N/A'}</div>
        <div class="req-meta">📍 ${r.pickupAddress || 'N/A'}</div>
        <div class="req-meta" style="margin-top:4px;font-size:11px;opacity:0.6;">ID: REQ-${r.id.slice(0,6).toUpperCase()}</div>
      </div>`;
  }).join('');
}
</script>
</body>
</html>
