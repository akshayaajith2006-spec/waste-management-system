<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EcoPickup – My Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="desktop.css" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Nunito:wght@400;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- ✅ FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="auth-guard.js"></script>

  <style>
    body {
      font-family: 'Nunito', sans-serif;
      background: #f4fdf7;
      margin: 0;
    }

    .app-shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f4fdf7;
      padding-bottom: 80px;
    }

    .profile-header {
      background: linear-gradient(135deg, #064e35, #059669);
      padding: 32px 20px 48px;
      text-align: center;
      color: white;
      position: relative;
    }

    .avatar {
      font-size: 56px;
      margin-bottom: 10px;
    }

    .profile-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 900;
    }

    .profile-email {
      font-size: 13px;
      opacity: 0.8;
      margin-top: 4px;
    }

    .profile-body {
      padding: 20px;
      margin-top: -24px;
    }

    .info-card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      margin-bottom: 16px;
    }

    .info-card h3 {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      color: #064e35;
      margin: 0 0 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0fdf4;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 12px;
      font-weight: 800;
      color: #5a7a65;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 700;
      color: #0c2116;
    }

    .stats-mini {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-mini {
      background: white;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .stat-mini-num {
      font-size: 22px;
      font-weight: 900;
      color: #059669;
    }

    .stat-mini-label {
      font-size: 11px;
      color: #5a7a65;
      font-weight: 700;
      margin-top: 2px;
    }

    .logout-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #dc2626, #ef4444);
      color: white;
      border: none;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <div class="profile-header">
      <div class="desktop-nav-links" style="justify-content: center; margin-bottom: 20px;">
         <a href="index.html">Home</a>
         <a href="request.html">Request</a>
         <a href="status.html">Track</a>
         <a href="userprofile.html">Profile</a>
      </div>
      <div class="avatar" id="userAvatar">🌿</div>
      <div class="profile-name" id="userName">Loading...</div>
      <div class="profile-email" id="userEmail"></div>
    </div>

    <div class="profile-body">

      <!-- Stats -->
      <div class="stats-mini">
        <div class="stat-mini">
          <div class="stat-mini-num" id="totalReqs">0</div>
          <div class="stat-mini-label">Requests</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-num" id="pendingReqs">0</div>
          <div class="stat-mini-label">Pending</div>
        </div>
        <div class="stat-mini">
          <div class="stat-mini-num" id="doneReqs">0</div>
          <div class="stat-mini-label">Done</div>
        </div>
      </div>

      <!-- Info Card -->
      <div class="info-card">
        <h3>👤 My Information</h3>
        <div class="info-row">
          <span class="info-label">Full Name</span>
          <span class="info-value" id="infoName">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="infoEmail">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Phone</span>
          <span class="info-value" id="infoPhone">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Address</span>
          <span class="info-value" id="infoAddress">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">Member Since</span>
          <span class="info-value" id="infoJoined">-</span>
        </div>
      </div>

      <!-- Logout -->
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item"><span class="nav-icon">🏠</span><span>Home</span></a>
      <a href="request.html" class="nav-item"><span class="nav-icon">📝</span><span>Request</span></a>
      <a href="status.html" class="nav-item"><span class="nav-icon">🔍</span><span>Track</span></a>
      <a href="userprofile.html" class="nav-item active"><span class="nav-icon">👤</span><span>Profile</span></a>
    </nav>

  </div>

  <script>
    // ✅ FIREBASE is already initialized by auth-guard.js in the head
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async user => {
      if (!user) { window.location.href = 'login.html'; return; }

      try {
        // Load user data from Firestore
        const userDoc = await db.collection('users').doc(user.uid).get();
        const data = userDoc.exists ? userDoc.data() : {};

        document.getElementById('userName').textContent = data.name || user.displayName || 'User';
        document.getElementById('userEmail').textContent = user.email;
        document.getElementById('infoName').textContent = data.name || '-';
        document.getElementById('infoEmail').textContent = user.email;
        document.getElementById('infoPhone').textContent = data.phone || '-';
        document.getElementById('infoAddress').textContent = data.address || '-';

        if (data.joinedAt) {
          const date = data.joinedAt.toDate ? data.joinedAt.toDate() : new Date(data.joinedAt);
          document.getElementById('infoJoined').textContent = date.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        // Load request stats
        const snapshot = await db.collection('requests').where('userId', '==', user.uid).get();
        const reqs = snapshot.docs.map(d => d.data());
        document.getElementById('totalReqs').textContent = reqs.length;
        document.getElementById('pendingReqs').textContent = reqs.filter(r => r.status === 'Pending').length;
        document.getElementById('doneReqs').textContent = reqs.filter(r => r.status === 'Done').length;
      } catch (err) {
        console.error("Profile Load Error:", err);
        document.getElementById('userName').textContent = "Error Loading Profile";
      }
    });

    async function logout() {
      await auth.signOut();
      sessionStorage.removeItem('eco_session');
      window.location.href = 'login.html';
    }
  </script>
</body>

</html>
